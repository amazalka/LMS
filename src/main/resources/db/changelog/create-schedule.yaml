databaseChangeLog:
  - changeSet:
      id: create-schedule
      author: azaliya
      changes:
        - createTable:
            tableName: schedule
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: group_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: course_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: teacher_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: time
                  type: TIMESTAMP
                  constraints:
                    nullable: false

        - addForeignKeyConstraint:
            baseTableName: schedule
            baseColumnNames: group_id
            referencedTableName: groups
            referencedColumnNames: id
            constraintName: fk_schedule_group
        - addForeignKeyConstraint:
            baseTableName: schedule
            baseColumnNames: course_id
            referencedTableName: courses
            referencedColumnNames: id
            constraintName: fk_schedule_course
        - addForeignKeyConstraint:
            baseTableName: schedule
            baseColumnNames: teacher_id
            referencedTableName: teachers
            referencedColumnNames: id
            constraintName: fk_schedule_teacher